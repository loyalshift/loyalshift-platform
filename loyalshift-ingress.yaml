apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loyalshift-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Redirect www to non-www
    nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - loyalshift.com
    - www.loyalshift.com
    secretName: loyalshift-tls
  rules:
  - host: loyalshift.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: loyalshift-platform-service
            port:
              number: 80
  - host: www.loyalshift.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: loyalshift-platform-service
            port:
              number: 80
