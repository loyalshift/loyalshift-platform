apiVersion: apps/v1
kind: Deployment
metadata:
  name: loyalshift-platform-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loyalshift-platform
  template:
    metadata:
      labels:
        app: loyalshift-platform
    spec:
      containers:
        - name: loyalshift-platform-container
          image: ghcr.io/loyalshift/loyalshift-platform:5829c2e
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
