apiVersion: apps/v1
kind: Deployment
metadata:
  name: loyalshift-platform-deployment # Name of the deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loyalshift-platform
  template:
    metadata:
      labels:
        app: loyalshift-platform
    spec:
      containers:
        - name: loyalshift-platform-container
          image: ghcr.io/loyalshift/loyalshift-platform:5829c2e
          ports:
            - containerPort: 3000
