<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Preconnect to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load the Inter font family -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- SEO & Core Meta Tags -->
    <title>LoyalShift | AI-Powered Modernization for Enterprise & SMBs</title>
    <meta
      name="description"
      content="LoyalShift delivers AI-powered solutions for legacy system modernization, partner ecosystem acceleration (Agent Hub™), and advanced BIM asset management. We empower both large enterprises and SMBs to transform and thrive."
    />
    <meta
      name="keywords"
      content="LoyalShift, AI, Legacy Modernization, Enterprise Software, SMB Solutions, Agent Hub, Digital Transformation, BIM, Fintech, Insurtech"
    />
    <!-- Theme Color matching the loyalShiftV2Theme cyan accent -->
    <meta name="theme-color" content="#0891b2" />

    <!-- Favicon & App Icons -->
    <link
      rel="icon"
      type="image/png"
      href="%PUBLIC_URL%/icons/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="%PUBLIC_URL%/icons/favicon.svg"
    />
    <link rel="shortcut icon" href="%PUBLIC_URL%/icons/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%PUBLIC_URL%/icons/apple-touch-icon.png"
    />
    <link rel="manifest" href="%PUBLIC_URL%/icons/site.webmanifest" />

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://loyalshift.com/" />
    <meta
      property="og:title"
      content="LoyalShift | AI-Powered Modernization for Enterprise & SMBs"
    />
    <meta
      property="og:description"
      content="From enterprise-grade legacy transformation to dedicated SMB growth solutions, LoyalShift provides the tools to build the future."
    />
    <meta
      property="og:image"
      content="%PUBLIC_URL%/images/logo-og-banner.png"
    />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://loyalshift.com/" />
    <meta
      name="twitter:title"
      content="LoyalShift | AI-Powered Modernization for Enterprise & SMBs"
    />
    <meta
      name="twitter:description"
      content="From enterprise-grade legacy transformation to dedicated SMB growth solutions, LoyalShift provides the tools to build the future."
    />
    <meta
      name="twitter:image"
      content="%PUBLIC_URL%/images/logo-og-banner.png"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
